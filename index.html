
<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GroenRijk Marge Tool</title>
<style>
body{
font-family: Arial, sans-serif;
background:#eef3ef;
margin:0;
padding:12px;
}

.card{
background:white;
max-width:420px;
margin:auto;
padding:16px;
border-radius:14px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

.logo{
text-align:center;
margin-bottom:10px;
}

.logo img{
max-width:220px;
height:auto;
}

.subtitle{
text-align:center;
font-size:12px;
color:#666;
margin-bottom:10px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

label{
font-size:12px;
font-weight:bold;
}

input{
width:100%;
padding:9px;
font-size:16px;
border-radius:7px;
border:1px solid #ccc;
background:#fff6a8;
}

.section{
margin-top:14px;
padding-top:10px;
border-top:1px solid #eee;
}

.result{
margin-top:8px;
background:#f4f7f4;
padding:10px;
border-radius:8px;
text-align:center;
}

.value{
font-size:22px;
font-weight:bold;
color:#2f8f3a;
}

.footer{
margin-top:12px;
text-align:center;
font-size:11px;
color:#777;
}
</style>
</head>
